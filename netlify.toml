[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  environment = { NODE_VERSION = "18", SECRETS_SCAN_ENABLED = "true" }

[dev]
  command = "vite --port 3000 --host"
  targetPort = 3000
  port = 8888
  autoLaunch = false
  framework = "#custom"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["netlify/functions/**"]

[[redirects]]
  from = "/api/quickbooks-oauth"
  to = "/.netlify/functions/quickbooks-oauth"
  status = 200

[[redirects]]
  from = "/api/quickbooks-api"
  to = "/.netlify/functions/quickbooks-api"
  status = 200

[[redirects]]
  from = "/api/process-saved-payment"
  to = "/.netlify/functions/process-saved-payment"
  status = 200

# SPA fallback - must be last
# IMPORTANT: Do not use force = true, as it would override function routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false