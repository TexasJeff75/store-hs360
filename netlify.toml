[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  # SECRETS_SCAN_OMIT_KEYS: Supabase anon key/URL are public by design (RLS protects data).
  # QB OAuth config values (client ID, environment, redirect URIs) are non-secret.
  environment = { NODE_VERSION = "20", SECRETS_SCAN_ENABLED = "true", SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,VITE_API_BASE,VITE_QB_CLIENT_ID,VITE_QB_ENVIRONMENT,VITE_QB_REALM_ID,VITE_QB_REDIRECT_URI,VITE_QB_REDIRECT_URI_PROD" }

[dev]
  command = "vite --port 3000 --host"
  targetPort = 3000
  port = 8888
  autoLaunch = false
  framework = "#custom"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["netlify/functions/**"]

[[redirects]]
  from = "/api/quickbooks-oauth"
  to = "/.netlify/functions/quickbooks-oauth"
  status = 200

[[redirects]]
  from = "/api/quickbooks-api"
  to = "/.netlify/functions/quickbooks-api"
  status = 200

[[redirects]]
  from = "/api/process-saved-payment"
  to = "/.netlify/functions/process-saved-payment"
  status = 200

[[redirects]]
  from = "/api/vault-payment-method"
  to = "/.netlify/functions/vault-payment-method"
  status = 200

# SPA fallback - must be last
# IMPORTANT: Do not use force = true, as it would override function routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false